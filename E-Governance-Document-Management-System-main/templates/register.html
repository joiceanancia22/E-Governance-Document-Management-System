{% extends 'base.html' %}

{% block title %}Register - Document Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Register</h4>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-4" id="registerTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="user-reg-tab" data-bs-toggle="tab" data-bs-target="#user-register" type="button" role="tab">
                            <i class="fas fa-user me-1"></i>User
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="issuer-reg-tab" data-bs-toggle="tab" data-bs-target="#issuer-register" type="button" role="tab">
                            <i class="fas fa-building me-1"></i>Issuer
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content" id="registerTabsContent">
                    <!-- User Registration Form -->
                    <div class="tab-pane fade show active" id="user-register" role="tabpanel">
                        <form method="POST" action="{{ url_for('register') }}">
                            <input type="hidden" name="user_type" value="user">
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="user-name" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="user-name" name="name" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="user-email" class="form-label">Email address</label>
                                    <input type="email" class="form-control" id="user-email" name="email" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="user-contact" class="form-label">Contact Number</label>
                                    <input type="text" class="form-control" id="user-contact" name="contact_number" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="user-aadhaar" class="form-label">Aadhaar Number</label>
                                    <input type="text" class="form-control" id="user-aadhaar" name="aadhaar_number" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="user-address" class="form-label">Address</label>
                                <textarea class="form-control" id="user-address" name="address" rows="2" required></textarea>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="user-dob" class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" id="user-dob" name="date_of_birth" required>
                                </div>
                                
                                <div class="col-md-4 mb-3">
                                    <label for="user-gender" class="form-label">Gender</label>
                                    <select class="form-select" id="user-gender" name="gender" required>
                                        <option value="" selected disabled>Select gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                
                                <div class="col-md-4 mb-3">
                                    <label for="user-nationality" class="form-label">Nationality</label>
                                    <input type="text" class="form-control" id="user-nationality" name="nationality" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="user-password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="user-password" name="password" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="user-confirm-password" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="user-confirm-password" name="confirm_password" required>
                                </div>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-user-plus me-1"></i>Register as User
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-3 text-center">
                            <p>Already have an account? <a href="{{ url_for('login') }}?user_type=user">Login here</a></p>
                        </div>
                    </div>
                    
                    <!-- Issuer Registration Form -->
                    <div class="tab-pane fade" id="issuer-register" role="tabpanel">
                        <form method="POST" action="{{ url_for('register') }}">
                            <input type="hidden" name="user_type" value="issuer">
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="issuer-name" class="form-label">Organization Name</label>
                                    <input type="text" class="form-control" id="issuer-name" name="issuer_name" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="issuer-type" class="form-label">Organization Type</label>
                                    <select class="form-select" id="issuer-type" name="issuer_type" required>
                                        <option value="" selected disabled>Select type</option>
                                        <option value="Educational Institution">Educational Institution</option>
                                        <option value="Government Agency">Government Agency</option>
                                        <option value="Financial Organization">Financial Organization</option>
                                        <option value="Corporate Entity">Corporate Entity</option>
                                        <option value="Healthcare Provider">Healthcare Provider</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="issuer-address" class="form-label">Address</label>
                                <textarea class="form-control" id="issuer-address" name="address" rows="2" required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="issuer-email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="issuer-email" name="email" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="issuer-password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="issuer-password" name="password" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="issuer-confirm-password" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="issuer-confirm-password" name="confirm_password" required>
                                </div>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-building me-1"></i>Register as Issuer
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-3 text-center">
                            <p>Already have an account? <a href="{{ url_for('login') }}?user_type=issuer">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    // Activate tab based on URL parameter
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const userType = urlParams.get('user_type');
        
        if (userType === 'issuer') {
            const issuerTab = document.getElementById('issuer-reg-tab');
            issuerTab.click();
        }
        
        // Form validation for password match
        const userForm = document.querySelector('#user-register form');
        const issuerForm = document.querySelector('#issuer-register form');
        
        [userForm, issuerForm].forEach(form => {
            form.addEventListener('submit', function(event) {
                const password = form.querySelector('input[name="password"]').value;
                const confirmPassword = form.querySelector('input[name="confirm_password"]').value;
                
                if (password !== confirmPassword) {
                    event.preventDefault();
                    alert('Passwords do not match!');
                }
            });
        });
    });
</script>
{% endblock %}

{% endblock %}
