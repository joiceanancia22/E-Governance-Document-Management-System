{% extends 'base.html' %}

{% block title %}Login - Document Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Login</h4>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-4" id="loginTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="user-tab" data-bs-toggle="tab" data-bs-target="#user-login" type="button" role="tab">
                            <i class="fas fa-user me-1"></i>User
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="issuer-tab" data-bs-toggle="tab" data-bs-target="#issuer-login" type="button" role="tab">
                            <i class="fas fa-building me-1"></i>Issuer
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content" id="loginTabsContent">
                    <!-- User Login Form -->
                    <div class="tab-pane fade show active" id="user-login" role="tabpanel">
                        <form method="POST" action="{{ url_for('login') }}">
                            <input type="hidden" name="user_type" value="user">
                            
                            <div class="mb-3">
                                <label for="user-email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="user-email" name="email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="user-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="user-password" name="password" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sign-in-alt me-1"></i>Login as User
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-3 text-center">
                            <p>Don't have an account? <a href="{{ url_for('register') }}?user_type=user">Register here</a></p>
                        </div>
                    </div>
                    
                    <!-- Issuer Login Form -->
                    <div class="tab-pane fade" id="issuer-login" role="tabpanel">
                        <form method="POST" action="{{ url_for('login') }}">
                            <input type="hidden" name="user_type" value="issuer">
                            
                            <div class="mb-3">
                                <label for="issuer-email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="issuer-email" name="email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="issuer-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="issuer-password" name="password" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sign-in-alt me-1"></i>Login as Issuer
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-3 text-center">
                            <p>Don't have an account? <a href="{{ url_for('register') }}?user_type=issuer">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    // Activate tab based on URL parameter
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const userType = urlParams.get('user_type');
        
        if (userType === 'issuer') {
            const issuerTab = document.getElementById('issuer-tab');
            issuerTab.click();
        }
    });
</script>
{% endblock %}

{% endblock %}
